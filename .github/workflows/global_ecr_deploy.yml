name: "Terraform Global ECR Deploy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select target environment"
        required: true
        default: "global"
        type: choice
        options:
          - global

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.7.0"
  AWS_REGION: "ap-southeast-2"  # Singapore

jobs:
  terraform-global-ecr:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./environments/global

    steps:
      # -------------------------
      # 1️⃣ Checkout code
      # -------------------------
      - name: "Checkout Code"
        uses: actions/checkout@v4

      # -------------------------
      # 2️⃣ Setup Terraform
      # -------------------------
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # -------------------------
      # 3️⃣ Configure AWS credentials
      # -------------------------
      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_UNBOUNDSHARE }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_UNBOUNDSHARE }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------
      # 4️⃣ Terraform Init
      # -------------------------
      - name: "Terraform Init"
        run: terraform init

      # -------------------------
      # 5️⃣ Terraform Plan
      # -------------------------
      - name: "Terraform Plan"
        run: terraform plan -out=tfplan

      # -------------------------
      # 6️⃣ Terraform Apply
      # -------------------------
      - name: "Terraform Apply"
        run: terraform apply -input=false tfplan

      # -------------------------
      # 7️⃣ Capture ECR Origin
      # -------------------------
      - name: "Output ECR Origin"
        id: ecr
        run: |
          # Capture only the base registry URL
          ORIGIN=$(terraform output -raw ecr_origin)
          
          # Store it in GITHUB_ENV for use in later steps
          echo "ECR_ORIGIN=$ORIGIN" >> $GITHUB_ENV
          
          # Debug output to console
          echo "ECR Origin is: $ORIGIN"