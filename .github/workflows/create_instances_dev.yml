name: "Terraform Infrastructure Deploy"

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Select target environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - production
          - infrastructure

permissions:
  contents: read
  pull-requests: write

env:
  TERRAFORM_VERSION: "1.7.0"
  AWS_REGION: "ap-southeast-2"  # Default region; can override per environment

jobs:
  # =========================
  # STAGE 1: PLAN
  # =========================
  terraform-plan:
    name: "1. Terraform Plan"
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_UNBOUNDSHARE }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_UNBOUNDSHARE }}
      AWS_REGION: ${{ env.AWS_REGION }}
      TF_LOG: "INFO"

    defaults:
      run:
        working-directory: ./environments/${{ github.event.inputs.environment }}

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Install Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: "Terraform Init"
        run: terraform init

      - name: "Terraform Format Check"
        run: terraform fmt -check

      - name: "Terraform Validate"
        run: terraform validate

      - name: "Generate Execution Plan"
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: "Upload Plan Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-plan
          path: ./environments/${{ github.event.inputs.environment }}/tfplan
          retention-days: 1

  # =========================
  # STAGE 2: APPLY
  # =========================
  terraform-apply:
    name: "2. Terraform Apply"
    needs: terraform-plan
    runs-on: ubuntu-latest

    # Trigger apply only on manual dispatch
    if: ${{ github.event_name == 'workflow_dispatch' }}

    # Set environment for GitHub protection rules
    environment: ${{ github.event.inputs.environment }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_UNBOUNDSHARE }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_UNBOUNDSHARE }}
      AWS_REGION: ${{ env.AWS_REGION }}

    defaults:
      run:
        working-directory: ./environments/${{ github.event.inputs.environment }}

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Download Plan Artifact"
        uses: actions/download-artifact@v4
        with:
          name: infrastructure-plan
          path: ./environments/${{ github.event.inputs.environment }}/

      - name: "Install Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: "Terraform Init"
        run: terraform init

      - name: "Terraform Apply (Manual Approval)"
        run: |
          terraform apply -input=false tfplan